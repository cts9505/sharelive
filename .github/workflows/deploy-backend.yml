name: Deploy Backend to EC2

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

concurrency:
  group: deploy-backend-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Deploy to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          # Setup SSH
          mkdir -p ~/.ssh
          echo "$EC2_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $EC2_HOST >> ~/.ssh/known_hosts

          # Create deployment package
          tar -czf backend.tar.gz -C backend dist package.json package-lock.json prisma

          # Copy to EC2
          scp backend.tar.gz $EC2_USER@$EC2_HOST:/home/$EC2_USER/

          # Deploy on EC2
          ssh $EC2_USER@$EC2_HOST << 'EOF'
            set -e

            DEPLOY_DIR="/home/$(whoami)/sharelive-backend"
            RELEASE_DIR="$DEPLOY_DIR/current"
            mkdir -p "$DEPLOY_DIR"
            mkdir -p "$RELEASE_DIR"
            cd "$DEPLOY_DIR"

            # Backup current version
            if [ -d "$RELEASE_DIR/dist" ]; then
              tar -czf backup-$(date +%Y%m%d-%H%M%S).tar.gz current
            fi

            # Clear previous release so deleted files don't linger
            rm -rf "$RELEASE_DIR"
            mkdir -p "$RELEASE_DIR"

            # Extract new version
            tar -xzf ~/backend.tar.gz -C "$RELEASE_DIR"

            cd "$RELEASE_DIR"

            # Install dependencies required for runtime and migrations
            npm ci

            # Validate required runtime configuration before restart
            test -f "$DEPLOY_DIR/.env"
            grep -q '^DATABASE_URL=' "$DEPLOY_DIR/.env"
            grep -q '^JWT_SECRET=' "$DEPLOY_DIR/.env"

            # Link shared environment file into the current release
            ln -sf "$DEPLOY_DIR/.env" .env

            # Run database migrations
            npx prisma generate
            npx prisma migrate deploy

            # Restart PM2
            pm2 restart sharelive-backend --update-env || pm2 start dist/server.js --name sharelive-backend
            pm2 save

            # Cleanup
            rm ~/backend.tar.gz

            # Keep only last 5 backups
            ls -t backup-*.tar.gz | tail -n +6 | xargs -r rm
          EOF

      - name: Verify deployment
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
        run: |
          sleep 10
          response=$(curl -fsS -o /dev/null -w "%{http_code}" "$BACKEND_URL/health" || true)
          if [ $response -eq 200 ]; then
            echo "✅ Deployment successful!"
          else
            echo "❌ Deployment failed - health check returned $response"
            exit 1
          fi

      - name: Notify on failure
        if: failure()
        run: |
          echo "🚨 Deployment failed! Check the logs."
